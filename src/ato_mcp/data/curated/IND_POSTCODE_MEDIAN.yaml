id: IND_POSTCODE_MEDIAN
name: Median & Average Taxable Income by Postcode — time series (2003-04 to 2022-23)
description: |
  ATO Taxation Statistics Table 8 — median and average taxable income for
  individuals by state/territory and postcode, across every income year
  from 2003-04 to 2022-23. ~2,300 postcodes × per-year (individual count,
  median, average). This is the "what's the median income in postcode X
  over time?" table — the cleanest answer to that exact question.
  Source: ATO Taxation Statistics, dataset on data.gov.au.
period_coverage: 2003-04 to 2022-23
update_frequency: annual
source_url: https://data.gov.au/data/dataset/taxation-statistics-2022-23
download_url: https://data.gov.au/data/dataset/03326c3f-c0d3-4af4-afc7-c6ccc0a02223/resource/e4b8c6b4-1185-4be6-9bd7-cf4385934d00/download/ts23individual08medianaveragetaxableincomestatepostcode.xlsx
discovery:
  organization_id: australiantaxationoffice
  package_id_pattern: '^taxation-statistics-(\d{4})-\d{2}$'
  resource_name: Individuals - Table 8
format: xlsx
sheet: Table 8
header_row: 2
layout: wide
cache_kind: data
search_keywords:
  - median income
  - average income
  - postcode income
  - postcode median taxable income
  - postcode trend
  - income time series
  - suburb income
  - property tech
  - household income
