id: FOREIGN_OWNERSHIP_RESIDENTIAL_BY_COUNTRY
name: Foreign Ownership of Australian Residential Land — by Country of Control
description: |
  Number of registered foreign-owned residential property interests in
  Australia, by country of control. Source: ATO Register of Foreign
  Ownership of Australian Assets — Residential Land workbook, Table 9.
  Reporting periods: 30 June 2024 and 30 June 2025 (annual snapshot).

  This is THE most-cited slice of the foreign-ownership register for
  residential property — answers "which countries control the most
  AU residential property?", "is Chinese foreign ownership growing
  or shrinking?", "how does Hong Kong compare to Singapore for AU
  residential investment?".

  Customer audience: real-estate analysts (Domain, REA, CoreLogic),
  property funds, FIRB-context policy researchers, journalists,
  political offices, financial-planning teams.

  Top countries at 30 June 2025 (registered interests count): China
  22,272 · Hong Kong 3,396 · Singapore 1,978 · Malaysia 1,795 ·
  Vietnam 1,658 · Japan 1,711 · India 1,235 · Indonesia 1,133 ·
  UK 1,070 · Taiwan 979 · USA 484. China declined slightly from
  23,550 in the 2024 snapshot.

  For domestic ag-land foreign ownership history, see
  FOREIGN_OWNERSHIP_AG_LAND. For total residential interests by
  state and property type, see the other tables in the source XLSX
  (not yet curated in this dataset).

  Note on shape: transposed layout where each row is a Country and
  each period (30 June 2024, 30 June 2025) is a column in the source
  workbook. The shaping layer melts these into long-format
  (country, period, value) records.
period_coverage: 30 June 2024 and 30 June 2025 (annual snapshot, 2 periods)
