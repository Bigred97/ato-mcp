id: GST_MONTHLY
name: GST, WET & LCT Monthly Collections (Historical — Jul 2020 to Jun 2023)
description: |
  ⚠️ HISTORICAL DATA — Jul 2020 to Jun 2023 only. ATO ceased publishing
  the monthly GST/WET/LCT collections series after the 2022-23 release;
  current monthly data is PDF-embedded in annual Taxation Statistics
  reports and not machine-accessible. Use this dataset for COVID-era and
  early post-COVID GST trend analysis only; do NOT cite as a live
  collections feed.

  ATO Taxation Statistics GST Table 1B — monthly Goods and Services Tax,
  Wine Equalisation Tax, and Luxury Car Tax collections from July 2020
  forward. Transposed-layout time series: each row is a metric (Net GST,
  Gross GST, Input tax credits, WET, LCT), each column is a month.
  Useful for "how did GST collections trend from COVID lockdown through
  2023?" — the dataset ends June 2023.
  Source: ATO Taxation Statistics 2022-23, on data.gov.au.
period_coverage: 2020-07 to 2023-06 (historical archive only)
update_frequency: annual
source_url: https://data.gov.au/data/dataset/taxation-statistics-2022-23
download_url: https://data.gov.au/data/dataset/03326c3f-c0d3-4af4-afc7-c6ccc0a02223/resource/b73b6ab3-41f7-49c1-ae76-c4290f61d862/download/ts23gst01gstwetlctbyyearmonth.xlsx
format: xlsx
sheet: Table 1B
header_row: 2
layout: transposed
cache_kind: data
metric_label_column: "Unnamed: 0"
unit_column: "Unnamed: 1"
search_keywords:
  - gst
  - net gst
  - goods and services tax
  - wine equalisation tax
  - wet
  - luxury car tax
  - lct
  - tax collections
  - monthly tax
  - macro fintech
  - government revenue
discovery:
  organization_id: australiantaxationoffice
  package_id_pattern: '^taxation-statistics-(\d{4})-\d{2}$'
  resource_name: GST - Table 1
columns:
  metric_label:
    source_column: "Unnamed: 0"
    description: GST/WET/LCT line item from the source table.
    role: dimension
    dtype: string
  unit:
    source_column: "Unnamed: 1"
    description: Unit indicator (always '$m' = millions AUD for the published rows).
    role: dimension
    dtype: string
dimension_values:
  metric_label:
    gross_gst: Gross GST payable
    input_tax_credits: Input tax credits2
    deferred_gst: Deferred GST payments on imports
    net_gst: Net GST
    wet_payable: WET payable
    wet_refundable: WET refundable
    net_wet: Net WET
    lct_payable: LCT payable
    lct_refundable: LCT refundable
    net_lct: Net LCT
